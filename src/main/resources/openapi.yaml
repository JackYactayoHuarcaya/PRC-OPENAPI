openapi: 3.0.0
info:
  title: PRC - OPENAPI
  description: practica para usar openapi
  version: 1.0.0
paths:
  /usuarios:
    get:
      operationId: getUsuarios
      responses:
        '200':
          description: obtener usuarios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuarios'

components:
  schemas:
    Usuario:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    Usuarios:
      type: array
      items:
        $ref: '#/components/schemas/Usuario'

